<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redirecting...</title>
    <script>
      // GitHub Pages serves this file for unknown routes.
      // Redirect back to app entry and keep the original route in querystring.
      (function () {
        const segmentCount = 1; // repository name segment: /resume
        const locationValue = window.location;
        const origin = locationValue.protocol + '//' + locationValue.hostname + (locationValue.port ? ':' + locationValue.port : '');
        const basePath = locationValue.pathname.split('/').slice(0, 1 + segmentCount).join('/');
        const routePath = locationValue.pathname
          .slice(1)
          .split('/')
          .slice(segmentCount)
          .join('/')
          .replace(/&/g, '~and~');
        const search = locationValue.search ? '&' + locationValue.search.slice(1).replace(/&/g, '~and~') : '';
        const target = `${origin}${basePath}/?/${routePath}${search}${locationValue.hash}`;
        locationValue.replace(target);
      })();
    </script>
  </head>
  <body></body>
</html>
